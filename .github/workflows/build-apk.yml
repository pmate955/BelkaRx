name: Build Android Artifacts

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compute Android versionCode
        id: version_code
        run: |
          VERSION_CODE=$((100000000 + GITHUB_RUN_NUMBER * 1000 + GITHUB_RUN_ATTEMPT))
          echo "value=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "Using versionCode=${VERSION_CODE}"

      - name: Decode and save keystore
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > app/keystore/release.keystore

      - name: Build signed release APK and App Bundle
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease bundleRelease -PCI_VERSION_CODE=${{ steps.version_code.outputs.value }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build debug APK (non-release builds)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleDebug -PCI_VERSION_CODE=${{ steps.version_code.outputs.value }}

      - name: Rename release APK and AAB with version info
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          BUILD_NUM=${{ github.run_number }}
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/BelkaRx-${{ github.ref_name }}-signed.apk
          mv app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/BelkaRx-${{ github.ref_name }}-signed.aab

      - name: Rename debug APK with version info
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        run: |
          BUILD_NUM=${{ github.run_number }}
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}
          mkdir -p app/build/outputs/apk/debug || true
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/BelkaRx-build${BUILD_NUM}-${SHORT_SHA}.apk
          fi

      - name: Upload release APK artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: BelkaRx-Release-APK-${{ github.ref_name }}
          path: app/build/outputs/apk/release/BelkaRx-*.apk
          retention-days: 90

      - name: Upload release AAB artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: BelkaRx-Release-AAB-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/BelkaRx-*.aab
          retention-days: 90

      - name: Upload debug APK artifact
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: BelkaRx-APK-build-${{ github.run_number }}
          path: app/build/outputs/apk/debug/BelkaRx-build*.apk
          retention-days: 30

      - name: Get tag message
        id: tag_msg
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          MSG=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          name: BelkaRx ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ${{ steps.tag_msg.outputs.message }}

            ---
            **Build:** ${{ github.ref_name }} | Commit: `${{ github.sha }}`
          files: |
            app/build/outputs/apk/release/BelkaRx-*.apk
            app/build/outputs/bundle/release/BelkaRx-*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
