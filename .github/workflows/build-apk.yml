name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew build

      - name: Rename APK with version info
        run: |
          BUILD_NUM=${{ github.run_number }}
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/BelkaRx-build${BUILD_NUM}-${SHORT_SHA}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BelkaRx-APK-build-${{ github.run_number }}
          path: app/build/outputs/apk/debug/BelkaRx-build*.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/BelkaRx-build*.apk
          tag_name: build-${{ github.run_number }}
          body: |
            **Build #${{ github.run_number }}**
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref }}
            Date: $(date)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
