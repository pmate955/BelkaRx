name: Build APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'build-*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew build

      - name: Rename APK with version info
        run: |
          BUILD_NUM=${{ github.run_number }}
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/BelkaRx-build${BUILD_NUM}-${SHORT_SHA}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BelkaRx-APK-build-${{ github.run_number }}
          path: app/build/outputs/apk/debug/BelkaRx-build*.apk
          retention-days: 30

      - name: Create Git Tag (only for branch pushes)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag -a build-${{ github.run_number }} -m "Build ${{ github.run_number }}" || true
          git push origin build-${{ github.run_number }} 2>/dev/null || true

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: BelkaRx ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            **Release: ${{ github.ref_name }}**
            Commit: ${{ github.sha }}
            Branch/Tag: ${{ github.ref }}
          files: app/build/outputs/apk/debug/BelkaRx-build*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
